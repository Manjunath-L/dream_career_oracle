{% load static %}
<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Delete Step</title>
    <link rel="stylesheet" href="{% static 'css/delete_step.css' %}" />
    <link rel="stylesheet" href="{% static 'css/global_background.css' %}" />
    <link rel="stylesheet" href="{% static 'css/messages.css' %}" />
  </head>

  <body>
    {% include "_messages.html" %}
    <div class="container">
      <h1>Delete Step?</h1>
      <p>Are you sure you want to delete this step?</p>
      <p><strong>{{ step.step_title }}</strong></p>

      <form method="POST">
        {% csrf_token %}
        <button type="submit" class="btn btn-yes">Yes, Delete</button>
        <a href="{% url 'dream_detail' step.dream.pk %}" class="btn btn-no"
          >Cancel</a
        >
      </form>
    </div>
  </body>
</html>
